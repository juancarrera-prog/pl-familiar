<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vs Presupuesto · Ignis</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0e0e0e;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;
}
.gauge-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.label-top {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 3px;
  color: #444;
  text-transform: uppercase;
}
.gauge-container {
  position: relative;
  width: 280px;
  height: 160px;
}
canvas#gauge {
  width: 280px;
  height: 160px;
}
.value-display {
  position: absolute;
  bottom: 0px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}
.value-number {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 42px;
  letter-spacing: 2px;
  line-height: 1;
  transition: color 0.5s;
}
.value-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: #444;
  text-transform: uppercase;
  margin-top: 2px;
}
.ticks {
  display: flex;
  justify-content: space-between;
  width: 260px;
  padding: 0 4px;
  margin-top: -4px;
}
.tick { font-size: 10px; color: #333; font-weight: 300; }
</style>
</head>
<body>
<div class="gauge-wrap">
  <div class="label-top">Vs Presupuesto · Período</div>
  <div class="gauge-container">
    <canvas id="gauge" width="560" height="320"></canvas>
    <div class="value-display">
      <div class="value-number" id="valueNum">—</div>
      <div class="value-label">desvío del período</div>
    </div>
  </div>
  <div class="ticks">
    <span class="tick">-100%</span>
    <span class="tick">-50%</span>
    <span class="tick">0%</span>
    <span class="tick">+50%</span>
    <span class="tick">+100%</span>
  </div>
</div>

<script>
const SHEET_ID = '1O7hQLDJWFEIQYxMWdCsGtVoUbP_NBVKk6D7tH6toTIg';
const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&range=I2`;

async function fetchValue() {
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^(]+\(/, '').replace(/\);?$/, ''));
    const raw = json.table.rows[0].c[0].v;
    return typeof raw === 'number' ? raw * 100 : parseFloat(String(raw).replace('%',''));
  } catch(e) {
    return -12.7; // fallback
  }
}

function drawGauge(value) {
  const canvas = document.getElementById('gauge');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const cx = W / 2;
  const cy = H * 0.88;
  const r = W * 0.42;

  ctx.clearRect(0, 0, W, H);

  // Arc params: -180deg to 0deg (left to right semicircle)
  const startAngle = Math.PI;
  const endAngle = 0;

  // Background track
  ctx.beginPath();
  ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.lineWidth = 28;
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineCap = 'butt';
  ctx.stroke();

  // Colored arc segments
  const segments = [
    { from: -100, to: -30, color: '#8b0000' },
    { from: -30,  to: -10, color: '#e8001c' },
    { from: -10,  to:   0, color: '#f5c400' },
    { from:   0,  to: 100, color: '#00c853' },
  ];

  segments.forEach(seg => {
    const aStart = Math.PI * (1 - (seg.from + 100) / 200);
    const aEnd   = Math.PI * (1 - (seg.to   + 100) / 200);
    ctx.beginPath();
    ctx.arc(cx, cy, r, aStart, aEnd, true);
    ctx.lineWidth = 28;
    ctx.strokeStyle = seg.color;
    ctx.lineCap = 'butt';
    ctx.stroke();
  });

  // Needle
  const clampedVal = Math.max(-100, Math.min(100, value));
  const needleAngle = Math.PI * (1 - (clampedVal + 100) / 200);
  const needleLen = r - 10;
  const nx = cx + needleLen * Math.cos(needleAngle);
  const ny = cy + needleLen * Math.sin(needleAngle) * -1;

  // Needle glow
  ctx.shadowColor = 'rgba(255,255,255,0.4)';
  ctx.shadowBlur = 8;

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(
    cx + needleLen * Math.cos(needleAngle),
    cy - needleLen * Math.sin(needleAngle)
  );
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#ffffff';
  ctx.lineCap = 'round';
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 10, 0, Math.PI * 2);
  ctx.fillStyle = '#0e0e0e';
  ctx.fill();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Value display
  const el = document.getElementById('valueNum');
  const sign = value >= 0 ? '+' : '';
  el.textContent = sign + value.toFixed(1) + '%';
  el.style.color = value < -10 ? '#e8001c' : value < 0 ? '#f5c400' : '#00c853';
}

async function init() {
  const val = await fetchValue();
  // Animate needle
  let current = -100;
  const target = val;
  const duration = 1200;
  const start = performance.now();
  function animate(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    current = -100 + (target + 100) * eased;
    drawGauge(current);
    if (progress < 1) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

init();
</script>
</body>
</html>
